<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #1e1e1e;
      color: #ccc;
      margin: 0;
      padding: 12px;
      width: 160px;
    }
    button {
      display: block;
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      background: #2580a2;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #1e6a87; }
    button:last-child { margin-bottom: 0; }
    #status {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <button id="png">Save as PNG</button>
  <button id="pdf">Save as PDF</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
